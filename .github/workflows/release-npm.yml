name: Publish to npm

# Triggered when release-please creates a GitHub release.
# Auth uses npm's OIDC trusted publishing — no NPM_TOKEN secret required.
# Requires a one-time setup on npmjs.com:
#   @jamesyong-42/reactive-ecs → Settings → Trusted Publishers →
#   Add GitHub Actions with:
#     owner: jamesyong-42
#     repository: reactive-ecs
#     workflow filename: release-npm.yml
#     environment: (leave blank)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC provenance + trusted publishing

jobs:
  publish:
    name: Publish @jamesyong-42/reactive-ecs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Update npm for OIDC trusted publishing
        # npm >= 11.5.1 required for trusted publishing (auth via OIDC, no NPM_TOKEN).
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Verify (lint + typecheck + test + build)
        run: pnpm run verify

      - name: Publish to npm
        run: npm publish --provenance --access public
