name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run typecheck

      - run: pnpm run test

      - run: pnpm run build

      - name: Verify package (publint)
        if: matrix.node == 22
        # `@arethetypeswrong/cli` is currently broken upstream: its bundled
        # `fflate@0.8.3` emits trailing zero-length chunks from `Gunzip`, and
        # attw keeps only the last chunk, so `untar()` returns [] and the CLI
        # crashes with "Cannot read properties of undefined (reading
        # 'filename')". attw hasn't shipped a release since 2025-06. Re-add
        # `pnpm dlx @arethetypeswrong/cli --pack` once attw is fixed.
        run: pnpm dlx publint
