name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run typecheck

      - run: pnpm run test

      - run: pnpm run build

      - name: Verify package (publint + arethetypeswrong)
        if: matrix.node == 22
        run: |
          pnpm dlx publint
          pnpm dlx @arethetypeswrong/cli --pack
